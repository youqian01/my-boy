<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> juju の story</title>
    <style>
        .html {
            font-size: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: SimSum , serif;
            background: linear-gradient(135deg, #e0f7ff 0%, #fcf0ff 100%);
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            /*color: #333;*/
            transition: 0.3s;
        }

        /* 开头剧情 */
        .story {
            
            margin-top: 100px;
            font-size: 28px;
            /*font-weight: bold;*/
            line-height: 1.8;
            display: block;
        }

        /*end*/
        .end {
            display: none;
            font-size: 16px;
            margin: 20px;
        }

        /* 选项按钮 */
        .options {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .btn {
            background:none;
            padding: 14px 30px;
            font-size: 18px;
            border-radius: 50px;
            border: 2px, solid,black;
            /*background: #73b6ff;*/
            /*color: rgb(8, 2, 2);*/
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #fcffd0;
            transform: scale(1.08);
        }

        .btn1:hover {
            background: rgb(255, 216, 216);
            
        }


        /*问题内的图片*/
        .inline-block {
            margin-top: 30px;
            width: 50%;
            height: 50%;
        }

        /* 照片区域（默认隐藏） */
        .gallery {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: 40px auto 0;
        }

        /*last 图片*/
        .last {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: 40px auto 0;
        }

        .photo-item {
            gap: 10px;
            margin-top: 30px;
            width: 80%;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(115, 182, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease; 
        }

        .photo-item:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 158, 184, 0.3);
        }

        /* 放大弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        /* 告白区域（默认隐藏） */
        .love-text {
            display: none;
            margin: 40px 20px;
            font-size: 20px;
            color: #555;
            line-height: 1.8;
        }

        .love-text span {
            color: #ff79a8;
            font-weight: bold;
        }

        .title {
            display: none;
            font-size: 28px;
            margin: 20px 0;
            font-weight: bold;
        }

        .q2 {
            color: #ff79a8;
        }

    </style>
</head>

<body>
   
    <!-- 第 1 题 -->
    <div id="q1" class="story" style="display:block;">
        你是谁？🐷
        <div>
            <img src="https://s41.ax1x.com/2026/04/01/peGCuBn.jpg" class="inline-block" onclick="openModal(this)">
        </div>
        <div class="options">
            <button class="btn" onclick="next1()">臭juju</button>
            <button class="btn btn1" onclick="next1()">香juju</button>
        </div>

    </div>

    <!-- 第 2 题 -->
    <div id="q2" class="story" style="display:none;">
        <div class="q2">请问图中的是？🐈</div>
        <div>
            <img src="https://s41.ax1x.com/2026/04/02/peGbCUH.jpg" class="inline-block" onclick="openModal(this)">
        </div>
        <div class="options">
            <button class="btn" onclick="next2()">一只猪</button>
            <button class="btn btn1" onclick="next2()">哈基米</button>
        </div>
    </div>

    <!-- 第 3 题 -->
    <div id="q3" class="story" style="display:none;">
        想不想oyq？

        <div>
            <img src="https://s41.ax1x.com/2026/04/01/peGC89U.jpg" class="inline-block" onclick="openModal(this)">
        </div>

        <div class="options">
            <button class="btn" onclick="next3()">想</button>
            <button class="btn btn1" onclick="next3()">想想想</button>
        </div>
    </div>


    <!-- 标题 -->
    <h1 class="title" id="title">和 juju 的合照 📸</h1>

    <!-- 照片墙 -->
    <div class="gallery" id="gallery">
        <img src="https://s41.ax1x.com/2026/04/02/peGb6sK.jpg" class="photo-item" onclick="openModal(this)">
        <img src="https://s41.ax1x.com/2026/04/02/peGbP5d.jpg" class="photo-item" onclick="openModal(this)">
        <img src="https://s41.ax1x.com/2026/04/01/peGCnns.jpg" class="photo-item" onclick="openModal(this)">
        <img src="https://s41.ax1x.com/2026/04/02/peGbdIJ.jpg" class="photo-item" onclick="openModal(this)">
        <img src="https://s41.ax1x.com/2026/04/01/peGC1hT.jpg" class="photo-item" onclick="openModal(this)">
        <img src="https://s41.ax1x.com/2026/04/01/peGCG3F.jpg" class="photo-item" onclick="openModal(this)">
        <img src="https://s41.ax1x.com/2026/04/01/peGCQA0.jpg" class="photo-item" onclick="openModal(this)">
        <img src="https://s41.ax1x.com/2026/04/01/peGCeXj.jpg" class="photo-item" onclick="openModal(this)">
        <img src="https://s41.ax1x.com/2026/04/02/peGb9Ve.jpg" class="photo-item" onclick="openModal(this)">
    </div>

    <!-- 放大弹窗 -->
    <div class="modal" id="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modalImg">
    </div>

    <!-- 告白 -->
    <div class="end" id="love">
        ❤️ 爱你哟 ❤️
    </div>

    <div class="last" id="last">
        <img src="https://s41.ax1x.com/2026/04/02/peGHzDO.jpg" class="photo-item" onclick="openModal(this)">
        <img src="https://s41.ax1x.com/2026/04/01/peGCK7q.jpg" class="photo-item" onclick="openModal(this)">

    </div>

    
    <script>
        // 选择1：显示全部内容
        function next1() {
            document.getElementById("q1").style.display = "none";
            document.getElementById("q2").style.display = "block";
        }

        function next2() {
            document.getElementById("q2").style.display = "none";
            document.getElementById("q3").style.display = "block";
        }

        function next3() {
            document.getElementById("q3").style.display = "none";
            document.getElementById("title").style.display = "block";
            document.getElementById("gallery").style.display = "block";
            document.getElementById("love").style.display = "block";
            document.getElementById("last").style.display = "block";


        }
 

        // 图片放大
        function openModal(img) {
            const modal = document.getElementById("modal");
            const modalImg = document.getElementById("modalImg");
            modal.style.display = "flex";
            modalImg.src = img.src;
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }
    </script>


</body>
</html>
